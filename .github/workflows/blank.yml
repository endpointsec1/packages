name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Stop Splunk Forwarder service
        shell: powershell
        run: |
          Stop-Service -Name SplunkForwarder
